<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Receipt</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(to right,#d4fc79,#96e6a1);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:white;
width:430px;
padding:35px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
}

h1{
color:green;
margin-bottom:20px;
}

h2{
margin-bottom:15px;
color:#333;
}

p{
font-size:16px;
margin:8px 0;
color:#555;
}

.receipt-box{
background:#f5fff5;
padding:18px;
border-radius:12px;
margin-top:15px;
margin-bottom:15px;
text-align:left;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:green;
color:white;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0b7a0b;
}
</style>

</head>
<body>

<div class="container">

<h1>♻️ Submission Successful</h1>

<h2>Digital Receipt</h2>

<p><b>Name:</b> <span id="username">Loading...</span></p>
<p><b>Matrix:</b> <span id="matrix">Loading...</span></p>

<div class="receipt-box">

<p><b>Woven Bag:</b> <span id="woven">0</span></p>
<p><b>Paper Bag:</b> <span id="paper">0</span></p>
<p><b>Canvas Bag:</b> <span id="canvas">0</span></p>

<p><b>Total Bags:</b> <span id="total">0</span></p>

</div>

<p>Thank you for supporting Green Campus ♻️</p>

<button onclick="finish()">Done</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAvAvsFrbnkcoF1P7svHB5txi0IKYEuwLM",
authDomain: "ecobagmonitoring.firebaseapp.com",
databaseURL: "https://ecobagmonitoring-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ecobagmonitoring",
storageBucket: "ecobagmonitoring.firebasestorage.app",
messagingSenderId: "294389166196",
appId: "1:294389166196:web:986cd505dfeecaa8662121"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// USER INFO FROM LOCAL STORAGE
document.getElementById("username").innerHTML =
localStorage.getItem("username");

document.getElementById("matrix").innerHTML =
localStorage.getItem("matrix");

// LIVE BAG COUNT FROM FIREBASE
const matrix = localStorage.getItem("matrix");

const bagRef = ref(
    db,
    `users/${matrix}/session`
);

onValue(bagRef,(snapshot)=>{

const data = snapshot.val();

if(data){

document.getElementById("woven").innerHTML = data.woven;
document.getElementById("paper").innerHTML = data.paper;
document.getElementById("canvas").innerHTML = data.canvas;
document.getElementById("total").innerHTML = data.total;

}

});

window.finish = async function(){

    const matrix = localStorage.getItem("matrix");

    await set(
        ref(db, `users/${matrix}/session`),
        {
            paper: 0,
            canvas: 0,
            woven: 0,
            total: 0
        }
    );

    await set(
        ref(db,"sorting_status"),
        false
    );

    await set(
        ref(db, "active_user"),
        {
            name: "",
            matrix: ""
        }
    );

    localStorage.clear();

    window.location.href = "student.html";

}

</script>

</body>
</html>

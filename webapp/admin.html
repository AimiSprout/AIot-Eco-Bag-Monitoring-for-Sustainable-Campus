<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoBag Admin Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(to right,#d4fc79,#96e6a1);
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
text-align:center;
color:green;
margin-bottom:35px;
font-size:42px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-bottom:30px;
}

.card{
background:#f1f8f1;
padding:25px;
border-radius:18px;
text-align:center;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
}

.card h2{
font-size:18px;
margin-bottom:10px;
color:#333;
}

.card p{
font-size:38px;
font-weight:bold;
color:green;
}

.alert-box{
margin-top:20px;
background:#fff0f0;
padding:25px;
border-left:8px solid red;
border-radius:18px;
}

.alert-box h2{
color:red;
margin-bottom:12px;
font-size:28px;
}

.alert-box p{
font-size:22px;
margin:6px 0;
color:#444;
}

.maintenance{
margin-top:30px;
background:#f8fff8;
padding:25px;
border-radius:18px;
}

.maintenance h2{
margin-bottom:20px;
color:#333;
}

.btn-group{
display:flex;
flex-wrap:wrap;
gap:12px;
}

button{
padding:14px 20px;
border:none;
background:green;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0b7a0b;
}

.btn-link{
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#1d7c1d;
color:white;
text-decoration:none;
border-radius:12px;
font-size:18px;
}

.footer{
text-align:center;
margin-top:25px;
color:#666;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h1>♻️ EcoBag Admin Dashboard</h1>

<div class="grid">

<div class="card">
<h2>Total Participants</h2>
<p id="participants">0</p>
</div>

<div class="card">
<h2>Total Bags</h2>
<p id="totalbags">0</p>
</div>

<div class="card">
<h2>Woven</h2>
<p id="woven">0</p>
</div>

<div class="card">
<h2>Paper</h2>
<p id="paper">0</p>
</div>

<div class="card">
<h2>Canvas</h2>
<p id="canvas">0</p>
</div>

</div>

<div class="alert-box">

<h2>⚠️ Bin Alert</h2>

<p id="alertmsg">Checking status...</p>
<p id="alertsub">Please wait...</p>

</div>

<div class="maintenance">

<h2>🛠 Maintenance Actions</h2>

<div class="btn-group">

<button onclick="clearPaper()">✅ Clear Paper</button>

<button onclick="clearCanvas()">✅ Clear Canvas</button>

<button onclick="clearWoven()">✅ Clear Woven</button>

</div>

<a href="analytics.html" class="btn-link">📊 View Analytics</a>

</div>

<div class="footer">
Live Firebase monitoring enabled.
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue,
set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAvAvsFrbnkcoF1P7svHB5txi0IKYEuwLM",
authDomain: "ecobagmonitoring.firebaseapp.com",
databaseURL: "https://ecobagmonitoring-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ecobagmonitoring",
storageBucket: "ecobagmonitoring.firebasestorage.app",
messagingSenderId: "294389166196",
appId: "1:294389166196:web:986cd505dfeecaa8662121"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);



// ==============================
// PARTICIPANTS
// ==============================
onValue(ref(db,"users"),(snapshot)=>{

const data = snapshot.val();

document.getElementById("participants").innerHTML =
data ? Object.keys(data).length : 0;

});



// ==============================
// BAG COUNT
// ==============================
onValue(ref(db,"bag_count"),(snapshot)=>{

const data = snapshot.val();

if(data){

document.getElementById("totalbags").innerHTML = data.total || 0;
document.getElementById("woven").innerHTML = data.woven || 0;
document.getElementById("paper").innerHTML = data.paper || 0;
document.getElementById("canvas").innerHTML = data.canvas || 0;

}

});



// ==============================
// ALERT
// ==============================
// BARU — alert kekal sampai admin clear
let activeAlerts = {
    woven: false,
    paper: false,
    canvas: false
};

function updateAlertDisplay() {
    const fullBins = [];
    if(activeAlerts.woven)  fullBins.push("Woven");
    if(activeAlerts.paper)  fullBins.push("Paper");
    if(activeAlerts.canvas) fullBins.push("Canvas");

    if(fullBins.length > 0){
        document.getElementById("alertmsg").innerHTML =
            "⚠️ " + fullBins.join(", ") + " compartment is FULL!";
        document.getElementById("alertsub").innerHTML =
            "Please empty and press Clear button.";
        document.querySelector(".alert-box").style.borderColor = "red";
        document.querySelector(".alert-box").style.background = "#fff0f0";
    } else {
        document.getElementById("alertmsg").innerHTML =
            "All bins operating normally.";
        document.getElementById("alertsub").innerHTML =
            "No action required.";
        document.querySelector(".alert-box").style.borderColor = "#ccc";
        document.querySelector(".alert-box").style.background = "#f9f9f9";
    }
}

// Listen bin_status — only SET alert, never auto clear
onValue(ref(db,"bin_status"),(snapshot)=>{
    const data = snapshot.val();
    if(data){
        // Only trigger alert bila FULL
        // Jangan clear alert walaupun sensor dah OK
        if(data.woven  == "FULL") activeAlerts.woven  = true;
        if(data.paper  == "FULL") activeAlerts.paper  = true;
        if(data.canvas == "FULL") activeAlerts.canvas = true;
        updateAlertDisplay();
    }
});



// ==============================
// CLEAR BUTTONS
// ==============================
window.clearPaper = function(){
    set(ref(db,"bin_status/paper"),"OK");
    activeAlerts.paper = false;
    updateAlertDisplay();
    alert("Paper compartment cleared.");
}

window.clearCanvas = function(){
    set(ref(db,"bin_status/canvas"),"OK");
    activeAlerts.canvas = false;
    updateAlertDisplay();
    alert("Canvas compartment cleared.");
}

window.clearWoven = function(){
    set(ref(db,"bin_status/woven"),"OK");
    activeAlerts.woven = false;
    updateAlertDisplay();
    alert("Woven compartment cleared.");
}

</script>

</body>
</html>
